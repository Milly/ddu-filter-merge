name: Test

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - "**.md"
      - "**.ts"
      - "deno.jsonc"
      - ".github/workflows/test.yml"

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  check:
    strategy:
      matrix:
        runner:
          - ubuntu-latest
        deno_version:
          - "2.3.0"
          - "2.x"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "${{ matrix.deno_version }}"

      - name: Pre-cache dependencies
        run: deno task cache

      - name: Check lint
        if: ${{ !cancelled() }}
        run: deno task check:lint

      - name: Check format
        if: ${{ !cancelled() }}
        run: deno task check:fmt

      - name: Check type
        if: ${{ !cancelled() }}
        run: deno task check:type

      - name: Check doc
        if: ${{ !cancelled() }}
        run: deno task check:doc
